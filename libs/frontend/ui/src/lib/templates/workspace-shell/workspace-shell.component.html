<ui-dashboard-layout>
  <ui-workspace-header [title]="title" [subtitle]="subtitle" [initials]="initials" [themeColor]="themeColor">
    <div header-top>
      <ui-breadcrumbs [items]="breadcrumbs" (itemClick)="breadcrumbClick.emit($event)"></ui-breadcrumbs>
    </div>

    <ng-container header-actions>
      <ng-content select="[right-actions]"></ng-content>
      @if (showNewFolder) {
      <ui-button variant="secondary" (clicked)="newFolder.emit()"> New Folder </ui-button>
      } @if (showUpload) {
      <input type="file" #fileInput hidden (change)="onFileSelected($event)" />
      <ui-button variant="primary" (clicked)="onUploadClick()"> Upload File </ui-button>
      }
    </ng-container>
  </ui-workspace-header>

  <ui-file-table
    [files]="files"
    [folders]="folders"
    (folderClick)="folderClick.emit($event.resourceId)"
  ></ui-file-table>
</ui-dashboard-layout>
