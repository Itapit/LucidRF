<div class="relative inline-flex">
  <!-- Image Avatar -->
  @if (src()) {
  <img [src]="src()" [alt]="alt()" [ngClass]="classes" class="object-cover" (error)="handleImageError()" />
  } @else {
  <!-- Fallback / Initials Avatar -->
  <div
    [ngClass]="classes"
    [style.background-color]="color() || '#f3f4f6'"
    [style.color]="color() ? '#ffffff' : '#374151'"
    class="flex items-center justify-center font-bold"
  >
    @if (initials()) {
    <span [ngClass]="textClasses">{{ initials() }}</span>
    } @else {
    <svg class="w-1/2 h-1/2 opacity-70" fill="currentColor" viewBox="0 0 24 24">
      <path
        d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z"
      />
    </svg>
    }
  </div>
  }
</div>
