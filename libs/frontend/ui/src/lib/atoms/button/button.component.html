<button
  [type]="type()"
  [attr.form]="form() || null"
  [disabled]="isDisabled"
  [attr.aria-busy]="loading()"
  (click)="onClick($event)"
  [ngClass]="classes"
>
  @if (loading()) {
  <ui-spinner [size]="ComponentSize.Small" class="mr-2"></ui-spinner>
  <span>{{ loadingText() }}</span>
  } @else {
  <ng-content></ng-content>
  }
</button>
