<nav class="flex items-center gap-2 text-sm font-medium font-sans" aria-label="Breadcrumb">
  <ng-container *ngFor="let item of items(); let isLast = last; let isFirst = first">
    <!-- Separator -->
    <svg *ngIf="!isFirst" class="w-4 h-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>

    <!-- Clickable item -->
    <button
      *ngIf="!isLast"
      (click)="itemClick.emit(item)"
      class="flex items-center gap-1.5 text-gray-500 hover:text-black transition-colors"
    >
      <svg *ngIf="item.icon === 'home'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
        />
      </svg>
      <span>{{ item.label }}</span>
    </button>

    <!-- Active item (last) -->
    <span *ngIf="isLast" class="flex items-center gap-1.5 text-black font-medium">
      <svg *ngIf="item.icon === 'home'" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
        />
      </svg>
      <span>{{ item.label }}</span>
    </span>
  </ng-container>
</nav>
