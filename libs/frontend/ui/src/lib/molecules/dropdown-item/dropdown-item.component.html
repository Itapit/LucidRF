<button
  class="w-full text-left px-4 py-3 text-sm font-medium rounded-2xl transition-all duration-200 hover:scale-[0.98] active:scale-95 flex items-center gap-3 team group"
  [ngClass]="{
    'text-gray-700 hover:text-black hover:bg-gray-100': variant === 'default',
    'text-red-600 hover:bg-red-50 hover:text-red-700': variant === 'danger'
  }"
  (click)="itemClick.emit($event)"
>
  <ng-content select="[icon]"></ng-content>
  <ng-content></ng-content>
</button>
