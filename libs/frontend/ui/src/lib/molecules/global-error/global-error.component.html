<div class="flex items-center justify-center fixed inset-0 z-50 bg-gray-50/90 backdrop-blur-sm">
  <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 max-w-sm w-full mx-4 text-center">
    <div class="flex justify-center mb-5">
      <div class="p-3 bg-red-50 rounded-full border border-red-100">
        <svg
          class="h-8 w-8 text-red-500"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      </div>
    </div>

    <h2 class="text-xl font-bold text-gray-900 mb-2">System Error</h2>
    <p class="text-gray-500 text-sm mb-6 whitespace-pre-line">{{ error() }}</p>

    <ui-button (clicked)="onRetry()" [fullWidth]="true"> Try Again </ui-button>
  </div>
</div>
