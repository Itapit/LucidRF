<div class="w-full flex flex-col gap-1.5">
  @if (label()) {
  <label [attr.for]="forId() || null" class="block text-sm font-semibold text-gray-700">
    {{ label() }}
    @if (required()) {
    <span class="text-red-500">*</span>
    }
  </label>
  }

  <!-- Input Projection -->
  <ng-content></ng-content>

  <!-- Error Message -->
  @if (error()) {
  <p class="text-xs text-red-500 font-medium mt-1 animate-fade-in">
    {{ error() }}
  </p>
  }

  <!-- Hint/Helper Text -->
  @if (hint() && !error()) {
  <p class="text-xs text-gray-500 mt-1">
    {{ hint() }}
  </p>
  }
</div>
