<ui-dropdown [positions]="positions">
  <!-- Trigger -->
  <div dropdown-trigger class="flex justify-center w-full mt-2">
    <ui-avatar
      [src]="'https://ui-avatars.com/api/?name=' + (user()?.username || 'User') + '&background=random'"
      [alt]="user()?.username || 'User'"
      size="md"
      [bordered]="true"
    ></ui-avatar>
  </div>

  <!-- Menu -->
  <div dropdown-menu class="w-72">
    <!-- Dropdown Header -->
    <div class="px-6 py-5 border-b border-gray-100 bg-gray-50/50">
      <div class="flex items-center gap-4">
        <ui-avatar
          [src]="'https://ui-avatars.com/api/?name=' + (user()?.username || 'User') + '&background=random'"
          [alt]="user()?.username || 'User'"
          size="lg"
        ></ui-avatar>
        <div class="flex flex-col overflow-hidden">
          <span class="font-bold text-base text-gray-900 truncate">{{ user()?.username }}</span>
          <span class="text-sm text-gray-500 truncate">{{ user()?.email }}</span>
        </div>
      </div>
      @if ($any(user()?.role) === 'ADMIN') {
      <div
        class="mt-4 inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold tracking-wider bg-black text-white uppercase"
      >
        Admin
      </div>
      }
    </div>

    <!-- Actions -->
    <div class="p-2 flex flex-col gap-1">
      <ui-dropdown-item (itemClick)="handleEditProfile()">
        <svg
          icon
          class="w-5 h-5 text-gray-400 group-hover:text-black transition-colors duration-200"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
          />
        </svg>
        Edit Profile
      </ui-dropdown-item>
    </div>

    <div class="w-full h-px bg-gray-100 my-1"></div>

    <!-- Danger Zone -->
    <div class="p-2 flex flex-col gap-1">
      <ui-dropdown-item variant="danger" (itemClick)="handleLogout()">
        <svg
          icon
          class="w-5 h-5 text-red-500 group-hover:text-red-600 transition-colors duration-200"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          />
        </svg>
        Log out
      </ui-dropdown-item>
    </div>
  </div>
</ui-dropdown>
