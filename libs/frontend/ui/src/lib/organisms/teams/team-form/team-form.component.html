<ui-modal-wrapper
  [title]="isEdit ? 'Team Settings' : 'Create New Team'"
  (closeModal)="onCancel()"
  formId="teamForm"
  [submitText]="isEdit ? 'Save Changes' : 'Create Team'"
  [submitDisabled]="form.invalid"
  [isSubmitting]="isSubmitting()"
>
  <div modal-body class="p-6 space-y-6">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" id="teamForm" class="space-y-4">
      <button type="submit" class="hidden">Submit</button>
      <ui-form-field label="Team Name">
        <input id="name" type="text" formControlName="name" placeholder="e.g. Protocol Analysis" uiInput />
      </ui-form-field>
      <ui-form-field label="Description (Optional)">
        <input id="description" type="text" formControlName="description" placeholder="Brief description..." uiInput />
      </ui-form-field>

      @if (isEdit) {
      <ui-form-field label="Team color">
        <select id="color" formControlName="color" uiSelect class="w-full">
          @for (entry of teamColorChoices; track entry[1]) {
          <option [value]="entry[1]">{{ entry[0].split('_').join(' ') }}</option>
          }
        </select>
      </ui-form-field>
      }

      @if (error()) {
      <ui-alert type="error" [message]="error()!"></ui-alert>
      }
    </form>

    @if (isEdit && showDangerZone) {
    <div class="pt-6 border-t border-red-100 mt-6">
      <h3 class="text-sm font-bold text-red-600 mb-2">Danger Zone</h3>
      <p class="text-xs text-gray-500 mb-3">
        Permanently delete this team and all of its associated files. This action cannot be undone.
      </p>
      <ui-button variant="danger" (click)="onDeleteTeam()" class="w-full"> Delete Team </ui-button>
    </div>
    }
  </div>
</ui-modal-wrapper>
