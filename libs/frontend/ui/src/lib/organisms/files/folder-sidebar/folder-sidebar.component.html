<aside
  class="w-72 bg-lrf-sidebar border-r border-lrf-border flex flex-col shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] animate-slide-in h-full"
>
  <!-- Header -->
  <div class="p-6 border-b border-lrf-border">
    <div class="flex items-center gap-3 mb-2">
      @if (headerVariant() === 'initials') {
      <div
        class="w-10 h-10 rounded-full text-white flex items-center justify-center font-bold text-sm shadow-sm"
        [style.background-color]="themeColor()"
      >
        {{ initials() }}
      </div>
      } @if (headerVariant() === 'icon') {
      <div
        class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 border border-gray-200 flex items-center justify-center font-bold text-sm shadow-sm"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
      </div>
      }

      <div>
        <h2 class="text-xl font-medium tracking-tight truncate w-44" [title]="title()">{{ title() }}</h2>
        <p class="text-xs text-gray-500 font-sans">{{ subtitle() }}</p>
      </div>
    </div>
  </div>

  <!-- Folder Tree -->
  <div class="flex-1 overflow-y-auto p-4 py-6 font-sans text-sm hide-scrollbar">
    <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4 px-2">Folders</h3>

    <ul class="space-y-1">
      <!-- All Files (Root) -->
      <li>
        <button
          (click)="folderClick.emit(null)"
          class="w-full flex items-center gap-3 px-2 py-2 text-left rounded hover:bg-black/5 transition-colors"
          [class.text-black]="!activeFolderId()"
          [class.font-medium]="!activeFolderId()"
          [class.bg-black-5]="!activeFolderId()"
          [class.text-gray-600]="activeFolderId()"
        >
          <svg
            class="w-4 h-4"
            [class.text-orange-500]="!activeFolderId()"
            [class.text-gray-400]="activeFolderId()"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
            />
          </svg>
          All Files
        </button>
      </li>

      <!-- Dynamic Folders -->
      <li *ngFor="let folder of folders()">
        <button
          (click)="folderClick.emit(folder.resourceId)"
          class="w-full flex items-center gap-3 px-2 py-2 text-left rounded hover:bg-black/5 transition-colors truncate"
          [class.pl-8]="folder.parentFolderId"
          [class.text-black]="activeFolderId() === folder.resourceId"
          [class.font-medium]="activeFolderId() === folder.resourceId"
          [class.bg-black-5]="activeFolderId() === folder.resourceId"
          [class.text-gray-600]="activeFolderId() !== folder.resourceId"
        >
          <svg
            class="w-4 h-4 shrink-0"
            [class.text-orange-500]="activeFolderId() === folder.resourceId"
            [class.text-gray-400]="activeFolderId() !== folder.resourceId"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
            />
          </svg>
          <span class="truncate">{{ folder.name }}</span>
        </button>
      </li>
    </ul>
  </div>

  <!-- Storage Info -->
  @if (storageInfo()) {
  <div class="p-6 border-t border-lrf-border bg-white">
    <p class="text-sm font-sans text-gray-600 flex justify-between mb-2">
      <span>Storage Used</span>
      <span class="font-mono text-xs">{{ storageInfo() }}</span>
    </p>
  </div>
  }
</aside>
