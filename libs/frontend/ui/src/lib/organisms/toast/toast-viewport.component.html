<div class="pointer-events-none fixed bottom-4 right-4 z-[1200] flex w-[min(420px,calc(100vw-2rem))] flex-col gap-2 sm:bottom-6 sm:right-6">
  @for (toast of toasts(); track toast.id) {
    <div
      class="pointer-events-auto rounded-xl border p-3 shadow-[0_12px_32px_-16px_rgba(15,23,42,0.45)] backdrop-blur-sm"
      [ngClass]="getContainerClasses(toast.type)"
      role="status"
      aria-live="polite"
    >
      <div class="flex items-start gap-2.5">
        <svg
          class="mt-0.5 h-4 w-4 flex-shrink-0"
          [ngClass]="getIconClasses(toast.type)"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          @if (toast.type === toastType.SUCCESS) {
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          } @else if (toast.type === toastType.ERROR) {
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M22 12a10 10 0 11-20 0 10 10 0 0120 0z" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M22 12a10 10 0 11-20 0 10 10 0 0120 0z" />
          }
        </svg>

        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold leading-tight">{{ toast.title }}</p>
          @if (toast.description) {
            <p class="mt-1 text-xs leading-relaxed opacity-85">{{ toast.description }}</p>
          }
        </div>

        <button
          type="button"
          class="rounded-md p-1 text-slate-500 transition-colors hover:bg-black/5 hover:text-slate-700"
          (click)="dismiss(toast.id)"
          aria-label="Dismiss notification"
        >
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  }
</div>
