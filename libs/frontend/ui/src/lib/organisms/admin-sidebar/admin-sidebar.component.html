<aside
  class="w-72 bg-lrf-sidebar border-r border-lrf-border flex flex-col shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] animate-slide-in h-full"
>
  <!-- Header -->
  <div class="p-6 border-b border-lrf-border">
    <div class="flex items-center gap-4 mb-4">
      <div class="w-12 h-12 rounded-xl bg-gray-900 text-white flex items-center justify-center font-bold text-lg shadow-sm border border-gray-800">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <div class="flex flex-col min-w-0 flex-1">
        <h2 class="text-sm font-bold text-gray-900 truncate tracking-tight">Admin Portal</h2>
        <span class="text-xs text-gray-500 font-medium tracking-wide uppercase mt-0.5">System Management</span>
      </div>
    </div>
  </div>

  <!-- Navigation List -->
  <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
    <div class="space-y-1 mb-6">
      <button
        (click)="tabClick.emit('users')"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all group outline-none focus-visible:ring-2 focus-visible:ring-black/5 focus-visible:ring-offset-1"
        [class.bg-black]="activeTab() === 'users'"
        [class.text-white]="activeTab() === 'users'"
        [class.shadow-sm]="activeTab() === 'users'"
        [class.text-gray-700]="activeTab() !== 'users'"
        [class.hover:bg-black/5]="activeTab() !== 'users'"
        [class.hover:text-black]="activeTab() !== 'users'"
      >
        <svg class="w-5 h-5 transition-colors" 
             [class.text-white]="activeTab() === 'users'"
             [class.text-gray-400]="activeTab() !== 'users'"
             [class.group-hover:text-gray-600]="activeTab() !== 'users'"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Users
      </button>

      <button
        (click)="tabClick.emit('monitoring')"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all group outline-none focus-visible:ring-2 focus-visible:ring-black/5 focus-visible:ring-offset-1"
        [class.bg-black]="activeTab() === 'monitoring'"
        [class.text-white]="activeTab() === 'monitoring'"
        [class.shadow-sm]="activeTab() === 'monitoring'"
        [class.text-gray-700]="activeTab() !== 'monitoring'"
        [class.hover:bg-black/5]="activeTab() !== 'monitoring'"
        [class.hover:text-black]="activeTab() !== 'monitoring'"
      >
        <svg class="w-5 h-5 transition-colors" 
             [class.text-white]="activeTab() === 'monitoring'"
             [class.text-gray-400]="activeTab() !== 'monitoring'"
             [class.group-hover:text-gray-600]="activeTab() !== 'monitoring'"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
        Monitoring
      </button>
    </div>
  </div>
</aside>
