<div
  class="px-8 pt-10 pb-6 bg-white flex flex-col sm:flex-row items-start justify-between gap-6 animate-fade-in border-b border-gray-100"
>
  <!-- Left Side: Avatar and Identity -->
  <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">
    <!-- Avatar -->
    <div class="flex-shrink-0">
      <div
        class="w-20 h-20 sm:w-24 sm:h-24 rounded-2xl text-white flex items-center justify-center font-bold text-3xl sm:text-4xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] bg-clip-padding backdrop-filter backdrop-blur-xl"
        [style.background-color]="themeColor()"
        [style.box-shadow]="'0 10px 25px -5px ' + themeColor() + '60'"
      >
        {{ initials() }}
      </div>
    </div>

    <!-- Typography -->
    <div class="flex flex-col justify-center text-center sm:text-left mt-1">
      <div class="mb-2 empty:hidden">
        <ng-content select="[header-top]"></ng-content>
      </div>
      <h1 class="text-4xl sm:text-5xl font-semibold tracking-tight text-gray-900 mb-2 font-display">
        {{ title() }}
      </h1>
      @if (subtitle()) {
      <p class="text-base sm:text-lg text-gray-500 max-w-2xl font-sans leading-relaxed">
        {{ subtitle() }}
      </p>
      }
    </div>
  </div>

  <!-- Right Side: Actions -->
  <div class="flex items-center gap-3 font-sans text-sm mt-4 sm:mt-0">
    <ng-content select="[header-actions]"></ng-content>
  </div>
</div>
