@if (isAppLoading()) {
<div class="flex items-center justify-center fixed inset-0 z-50 bg-white/80">
  <ui-spinner [size]="ComponentSize.Large" variant="default"></ui-spinner>
</div>
} @else { @if (globalError(); as error) {
<ui-global-error [error]="error" (retry)="reloadApp()"></ui-global-error>
} @else {
<div class="flex h-screen w-full bg-white overflow-hidden">
  <!-- Sidebar -->
  @if (isLoggedIn()) {
  <ui-global-sidebar
    [teams]="teams() || []"
    [isAdmin]="role() === SystemRole.ADMIN"
    [user]="user()"
    (goHome)="goHome()"
    (goWorkspace)="goWorkspace()"
    (goTeam)="goTeam($event)"
    (goAdmin)="goAdmin()"
    (logout)="logout()"
    (logoutAll)="logoutAll()"
    (editProfile)="editProfile()"
  >
  </ui-global-sidebar>
  }

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden w-full h-full relative z-0 bg-white">
    <router-outlet></router-outlet>
  </main>
</div>
} }
