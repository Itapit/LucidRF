<ng-container *ngIf="isAppLoading$ | async; else appContent">
  <div class="flex items-center justify-center fixed inset-0 z-50 bg-white/80">
    <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
</ng-container>

<ng-template #appContent>
  <ng-container *ngIf="globalError$ | async as error; else shell">
    <div class="flex items-center justify-center fixed inset-0 z-50 bg-black/50">
      <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
        <h2 class="text-xl font-bold text-red-600 mb-4">Error</h2>
        <p class="text-gray-700 mb-6">{{ error }}</p>
        <button
          (click)="reloadApp()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition-colors flex justify-center items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
              clip-rule="evenodd"
            />
          </svg>
          Try Again
        </button>
      </div>
    </div>
  </ng-container>
</ng-template>

<ng-template #shell>
  <div class="flex h-screen w-full bg-white overflow-hidden">
    <!-- Sidebar -->
    <app-global-sidebar
      *ngIf="isLoggedIn$ | async"
      [teams]="(teams$ | async) || []"
      [isAdmin]="(role$ | async) === SystemRole.ADMIN"
      (goHome)="goHome()"
      (goWorkspace)="goWorkspace()"
      (goTeam)="goTeam($event)"
      (goAdmin)="goAdmin()"
      (uploadClick)="openUpload()"
    >
    </app-global-sidebar>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden w-full h-full relative z-0 bg-white">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-template>
