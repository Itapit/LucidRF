<header
      class="w-full px-8 py-8 flex justify-between items-end z-10 sticky top-0"
      [ngClass]="
        variant === 'overview' ? 'bg-gradient-to-b from-lrf-bg to-transparent' : 'bg-white border-b border-lrf-border'
      "
    >
      <!-- Left Content (projected) -->
      <div class="flex flex-col">
        <ng-content select="[left-content]"></ng-content>
      </div>

      <!-- Right Side: Search + Profile -->
      <div class="flex items-center gap-6">
        <!-- Search Bar -->
        <div class="flex items-center border-b-2 border-black pb-1 w-64">
          <input
            type="text"
            placeholder="Search files, teams..."
            class="bg-transparent border-none outline-none w-full font-sans text-sm text-gray-900 placeholder-gray-400 placeholder:text-gray-400"
            (keyup.enter)="search.emit(searchInput.value)"
            #searchInput
          />
          <svg
            class="w-4 h-4 text-black cursor-pointer"
            (click)="search.emit(searchInput.value)"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </div>

        <!-- Profile Avatar + Dropdown -->
        <div class="relative">
          <img
            [src]="'https://ui-avatars.com/api/?name=' + (user?.username || 'User') + '&background=random'"
            alt="User"
            class="w-12 h-12 rounded-full border-2 shadow-sm cursor-pointer transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500"
            [ngClass]="isDropdownOpen ? 'border-blue-500' : 'border-gray-200 hover:border-gray-400'"
            (click)="toggleDropdown($event)"
          />

          <!-- Profile Dropdown Menu -->
          <div
            *ngIf="isDropdownOpen"
            class="absolute right-0 top-14 w-72 bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden transform origin-top-right animate-fade-in z-50"
            (click)="$event.stopPropagation()"
          >
            <!-- Dropdown Header -->
            <div class="px-6 py-5 border-b border-gray-100 bg-gray-50/50">
              <div class="flex items-center gap-4">
                <img
                  [src]="'https://ui-avatars.com/api/?name=' + (user?.username || 'User') + '&background=random'"
                  alt="User"
                  class="w-12 h-12 rounded-full border border-gray-200"
                />
                <div class="flex flex-col overflow-hidden">
                  <span class="font-bold text-base text-gray-900 truncate">{{ user?.username }}</span>
                  <span class="text-sm text-gray-500 truncate">{{ user?.email }}</span>
                </div>
              </div>
              <div
                *ngIf="$any(user?.role) === 'ADMIN'"
                class="mt-4 inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold tracking-wider bg-black text-white uppercase"
              >
                Admin
              </div>
            </div>

            <!-- Actions -->
            <div class="p-2">
              <button
                class="w-full text-left px-4 py-3 text-sm font-medium text-gray-700 hover:text-black hover:bg-gray-100 rounded-2xl transition-all duration-200 hover:scale-[0.98] active:scale-95 flex items-center gap-3 team"
                (click)="editProfile.emit(); closeDropdown()"
              >
                <svg
                  class="w-5 h-5 text-gray-400 team-hover:text-black transition-colors duration-200"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                  />
                </svg>
                Edit Profile
              </button>
            </div>

            <div class="w-full h-px bg-gray-100 my-1"></div>

            <!-- Danger Zone -->
            <div class="p-2">
              <button
                class="w-full text-left px-4 py-3 text-sm font-medium text-red-600 hover:bg-red-50 hover:text-red-700 rounded-2xl transition-all duration-200 hover:scale-[0.98] active:scale-95 flex items-center gap-3 team"
                (click)="logout.emit(); closeDropdown()"
              >
                <svg
                  class="w-5 h-5 text-red-500 team-hover:text-red-600 transition-colors duration-200"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                  />
                </svg>
                Log out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>
