<div
  class="min-w-[300px] p-6 rounded-2xl border transition-all cursor-pointer relative overflow-hidden team hover:shadow-xl bg-white border-gray-200 hover:border-black"
  tabindex="0"
  (keyup.enter)="teamClick.emit(team.id)"
  (click)="teamClick.emit(team.id)"
>
  <!-- Decorative corner blob -->
  <div
    class="absolute top-0 right-0 w-24 h-24 rounded-bl-full -mr-4 -mt-4 team-hover:scale-110 transition-transform opacity-20"
    [style.background-color]="team.color"
  ></div>

  <div class="flex justify-between items-start mb-12">
    <!-- Team Initials Avatar -->
    <div
      *ngIf="team.type === TeamType.COLLABORATIVE"
      class="w-12 h-12 rounded-full text-white flex items-center justify-center font-bold text-lg z-10 team-hover:scale-105 transition-transform shadow-[0_4px_12px_rgba(0,0,0,0.2)]"
      [style.background-color]="team.color"
    >
      {{ team.initials }}
    </div>

    <div
      *ngIf="team.type === TeamType.PERSONAL"
      class="w-12 h-12 rounded-full flex items-center justify-center z-10 team-hover:scale-105 transition-transform bg-gray-100 text-gray-700"
    >
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
        />
      </svg>
    </div>

    <!-- Member Avatars -->
    <div class="flex -space-x-3 z-10" *ngIf="team.type === TeamType.COLLABORATIVE && team.members.length">
      <ng-container *ngFor="let member of team.members | slice : 0 : 3">
        <img
          *ngIf="member.user"
          [src]="'https://ui-avatars.com/api/?name=' + member.user.username + '&background=random'"
          [alt]="member.user.username"
          class="w-8 h-8 rounded-full border-2 border-white"
        />
      </ng-container>
      <div
        *ngIf="team.members.length > 3"
        class="w-8 h-8 rounded-full bg-gray-100 border-2 border-white flex items-center justify-center text-[10px] font-sans text-black"
      >
        +{{ team.members.length - 3 }}
      </div>
    </div>
  </div>

  <h3 class="text-2xl font-medium mb-1">{{ team.type === TeamType.PERSONAL ? 'My Workspace' : team.name }}</h3>
  <p *ngIf="team.type === TeamType.COLLABORATIVE" class="font-sans text-sm text-gray-500">
    {{ team.members.length }} members
  </p>
  <p *ngIf="team.type === TeamType.PERSONAL" class="font-sans text-sm text-gray-500">Private files</p>
</div>
