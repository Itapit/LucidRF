<app-modal-wrapper [title]="isEdit ? 'Team Settings' : 'Create New Team'" (closeModal)="cancel.emit()">
      <div modal-body class="p-6 space-y-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" id="teamForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Team Name</label>
            <input
              type="text"
              formControlName="name"
              placeholder="e.g. Protocol Analysis"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Description (Optional)</label>
            <input
              type="text"
              formControlName="description"
              placeholder="Brief description..."
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
            />
          </div>
        </form>

        <div *ngIf="isEdit && showDangerZone" class="pt-6 border-t border-red-100 mt-6">
          <h3 class="text-sm font-bold text-red-600 mb-2">Danger Zone</h3>
          <p class="text-xs text-gray-500 mb-3">
            Permanently delete this team and all of its associated files. This action cannot be undone.
          </p>
          <button
            (click)="deleteTeam.emit()"
            class="px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg text-sm font-semibold hover:bg-red-600 hover:text-white transition-colors w-full"
          >
            Delete Team
          </button>
        </div>
      </div>

      <div modal-footer class="flex gap-3 w-full justify-end">
        <button
          type="button"
          (click)="cancel.emit()"
          class="px-4 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 transition-colors"
        >
          Cancel
        </button>
        <button
          type="submit"
          form="teamForm"
          [disabled]="form.invalid"
          class="px-4 py-2 bg-black text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors shadow-sm active:scale-95 disabled:opacity-50"
        >
          {{ isEdit ? 'Save Changes' : 'Create Team' }}
        </button>
      </div>
    </app-modal-wrapper>
