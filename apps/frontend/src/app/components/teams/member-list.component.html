<app-modal-wrapper
      [title]="isOwner ? 'Manage Members' : 'Team Members'"
      (closeModal)="close.emit()"
      [showFooter]="false"
    >
      <!-- Custom Header Description using ng-content hack? No, we can just use the body and hide the default footer -->
      <div modal-body class="flex flex-col h-full max-h-[70vh]">
        <!-- Add Member Section (Owners only) -->
        <div *ngIf="isOwner" class="p-6 border-b border-gray-100 bg-gray-50 shrink-0">
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Invite New Member</label>
          <div class="flex gap-2">
            <input
              type="text"
              [formControl]="userIdInput"
              placeholder="User ID..."
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
            />
            <button
              (click)="onInvite()"
              [disabled]="userIdInput.invalid"
              class="px-4 py-2 bg-black text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors shadow-sm active:scale-95 shrink-0 disabled:opacity-50"
            >
              Invite
            </button>
          </div>
        </div>

        <!-- Member List (scrollable) -->
        <div class="flex-1 overflow-y-auto p-2 hide-scrollbar">
          <ul class="space-y-1">
            <li
              *ngFor="let member of team?.members"
              class="flex items-center justify-between p-3 hover:bg-gray-50 rounded-xl transition-colors group"
            >
              <!-- Member Info -->
              <div class="flex items-center gap-3" *ngIf="member.user">
                <div class="relative">
                  <ng-container *ngIf="member.user.username === 'AI_PIPELINE'; else humanAvatar">
                    <div
                      class="w-10 h-10 rounded-full bg-black text-white flex items-center justify-center text-xs font-bold shadow-sm"
                    >
                      AI
                    </div>
                  </ng-container>
                  <ng-template #humanAvatar>
                    <img
                      [src]="'https://ui-avatars.com/api/?name=' + member.user.username + '&background=random'"
                      [alt]="member.user.username"
                      class="w-10 h-10 rounded-full shadow-sm border border-gray-100"
                    />
                  </ng-template>

                  <!-- Owner badge -->
                  <div
                    *ngIf="member.role === 'OWNER'"
                    class="absolute -bottom-1 -right-1 bg-orange-500 text-white w-4 h-4 rounded-full flex items-center justify-center border-2 border-white"
                    title="Team Owner"
                  >
                    <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 20 20">
                      <path
                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
                      />
                    </svg>
                  </div>
                </div>
                <div>
                  <p class="text-sm font-bold text-gray-900 flex items-center gap-2">{{ member.user.username }}</p>
                  <p class="text-xs text-gray-500 capitalize">{{ member.role.toLowerCase() }}</p>
                </div>
              </div>

              <!-- Actions / Role -->
              <div class="flex items-center gap-3" *ngIf="member.user">
                <button
                  *ngIf="isOwner && member.role !== 'OWNER' && currentUserId !== member.userId"
                  (click)="removeMember.emit(member.userId)"
                  class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1.5 hover:bg-red-50 rounded"
                  title="Remove Member"
                >
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                </button>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </app-modal-wrapper>
