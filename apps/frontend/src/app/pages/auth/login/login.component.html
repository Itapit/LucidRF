<div class="flex justify-center items-center min-h-screen bg-gray-50">
  <div class="w-full max-w-sm px-6">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-black tracking-tight mb-2">LucidRF</h1>
      <p class="text-gray-500 text-sm">Sign in to your account</p>
    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="bg-white p-8 rounded-xl shadow-sm border border-gray-200"
    >
      <div class="mb-5">
        <label for="email" class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-wide">Email</label>
        <div class="relative">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="name@company.com"
            class="appearance-none border border-gray-300 rounded-md w-full py-2.5 px-3 text-gray-900 text-sm focus:outline-none focus:ring-1 focus:ring-black focus:border-black transition-colors"
          />
        </div>
      </div>

      <div class="mb-6">
        <label for="password" class="block text-gray-700 text-xs font-bold mb-2 uppercase tracking-wide"
          >Password</label
        >
        <div class="relative">
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="appearance-none border border-gray-300 rounded-md w-full py-2.5 px-3 text-gray-900 text-sm focus:outline-none focus:ring-1 focus:ring-black focus:border-black transition-colors"
          />
        </div>
      </div>

      <div
        *ngIf="error$ | async as error"
        class="bg-red-50 border border-red-200 p-3 mb-6 rounded-md flex items-start gap-2"
      >
        <svg
          class="h-4 w-4 text-red-500 mt-0.5 flex-shrink-0"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"
          />
        </svg>
        <p class="text-xs text-red-700 font-medium leading-relaxed">{{ error }}</p>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || ((isLoading$ | async) ?? false)"
        class="w-full flex justify-center items-center gap-2 py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-all disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg
          *ngIf="(isLoading$ | async) ?? false"
          class="animate-spin h-4 w-4 text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span *ngIf="!((isLoading$ | async) ?? false)">Sign In</span>
        <span *ngIf="(isLoading$ | async) ?? false">Signing in...</span>
      </button>
    </form>
  </div>
</div>
