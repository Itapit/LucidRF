<div class="flex justify-center items-center min-h-screen bg-gray-50">
  <div class="w-full max-w-sm px-6">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-black tracking-tight mb-2">LucidRF</h1>
      <p class="text-gray-500 text-sm">Set your password to activate your account</p>
    </div>

    <form
      [formGroup]="setupForm"
      (ngSubmit)="onSubmit()"
      class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 flex flex-col gap-5"
    >
      <ui-form-field label="New Password" forId="password" [error]="passwordError">
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter new password"
          uiInput
          [hasError]="!!passwordError"
        />
      </ui-form-field>

      <ui-alert *ngIf="error$ | async as err" type="error" [message]="err"></ui-alert>

      <ui-button type="submit" [disabled]="setupForm.invalid || ((isLoading$ | async) ?? false)" [fullWidth]="true">
        <svg
          *ngIf="(isLoading$ | async) ?? false"
          class="animate-spin h-4 w-4 mr-2"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span *ngIf="!((isLoading$ | async) ?? false)">Activate Account</span>
        <span *ngIf="(isLoading$ | async) ?? false">Activating...</span>
      </ui-button>
    </form>
  </div>
</div>
