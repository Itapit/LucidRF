<div class="flex-1 flex flex-col h-full bg-white relative animate-fade-in w-full" *ngIf="team$ | async as team">
  <ui-top-header variant="solid" [user]="user$ | async" (logout)="onLogout()">
    <div left-content>
      <ui-breadcrumbs [items]="getBreadcrumbs(team)" (itemClick)="onBreadcrumbClick($event)"></ui-breadcrumbs>
    </div>
  </ui-top-header>

  <div class="flex-1 flex overflow-hidden">
    <ui-folder-sidebar
      [title]="team.name"
      [subtitle]="(files$ | async)?.length + ' files'"
      [initials]="team.initials"
      [themeColor]="team.color"
      headerVariant="initials"
      [folders]="folders$ | async"
      (folderClick)="onFolderClick()"
    >
    </ui-folder-sidebar>

    <main class="flex-1 flex flex-col overflow-hidden bg-white relative">
      <ui-page-action-bar [title]="team.name" (newFolder)="onNewFolder()" (uploadFile)="onUploadFile()">
        <div left-actions class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-gray-400 ml-4">
          <button class="hover:text-black transition-colors">{{ team.name }}</button>
          <!-- Breadcrumbs for folders could go here -->
        </div>

        <ng-container right-actions>
          <button
            *ngIf="canManageTeam$ | async"
            (click)="openSettings(team)"
            class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50 transition-colors font-medium hover:shadow-sm"
          >
            Settings
          </button>
          <button
            (click)="openMembers(team)"
            class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50 transition-colors font-medium hover:shadow-sm"
          >
            Members
          </button>
        </ng-container>
      </ui-page-action-bar>

      <ui-file-table [files]="files$ | async"></ui-file-table>
    </main>
  </div>
</div>
