@if (store.team(); as t) {
<ui-workspace-shell
  [title]="t.name"
  [subtitle]="t.description || ''"
  [initials]="t.initials"
  [themeColor]="t.color"
  [breadcrumbs]="getBreadcrumbs(t)"
  [files]="store.files()"
  [folders]="store.folders()"
  (folderClick)="store.onFolderClick()"
  (newFolder)="store.onNewFolder()"
  (uploadFile)="store.onUploadFile(t.id, $event)"
  (breadcrumbClick)="onBreadcrumbClick($event)"
>
  <ng-container right-actions>
    @if (store.canManageTeam()) {
    <button
      (click)="openSettings(t)"
      class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50 transition-colors font-medium hover:shadow-sm"
    >
      Settings
    </button>
    }
    <button
      (click)="openMembers(t)"
      class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50 transition-colors font-medium hover:shadow-sm"
    >
      Members
    </button>
  </ng-container>
</ui-workspace-shell>
}
