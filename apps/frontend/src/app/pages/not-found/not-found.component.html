<ui-centered-layout title="404" subtitle="Page Not Found">
  <div header-icon class="flex justify-center mb-6">
    <div class="p-3 bg-white rounded-full border border-gray-200 shadow-sm">
      <svg
        class="h-10 w-10 text-gray-400"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"
        />
      </svg>
    </div>
  </div>

  <div class="text-center flex flex-col gap-5 contents">
    <p class="text-gray-500 text-sm leading-relaxed">The page you're looking for doesn't exist or has been moved.</p>

    <ui-button [fullWidth]="true" (clicked)="goHome()"> Return to Homepage </ui-button>
  </div>
</ui-centered-layout>
