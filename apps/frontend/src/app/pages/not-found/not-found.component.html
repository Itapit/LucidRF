<div class="flex justify-center items-center min-h-screen bg-gray-50">
  <div class="w-full max-w-sm px-6">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 text-center">
      <div class="flex justify-center mb-6">
        <div class="p-3 bg-gray-50 rounded-full border border-gray-100">
          <svg
            class="h-10 w-10 text-gray-400"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"
            />
          </svg>
        </div>
      </div>

      <h1 class="text-3xl font-extrabold text-black tracking-tight mb-2">404</h1>
      <h2 class="text-lg font-bold text-gray-800 mb-2">Page Not Found</h2>
      <p class="text-gray-500 text-sm mb-8 leading-relaxed">
        The page you're looking for doesn't exist or has been moved.
      </p>

      <ui-button [fullWidth]="true" (clicked)="goHome()"> Return to Homepage </ui-button>
    </div>
  </div>
</div>
