<ui-dashboard-layout>
  <ui-top-header layout-header variant="solid" [user]="user$ | async" (logout)="onLogout()">
    <div left-content>
      <ui-breadcrumbs [items]="breadcrumbs" (itemClick)="onBreadcrumbClick($event)"></ui-breadcrumbs>
    </div>
  </ui-top-header>

  <ui-folder-sidebar
    layout-sidebar
    title="My Workspace"
    [subtitle]="((files$ | async)?.length || 0) + ' files'"
    initials="ME"
    themeColor="BLUE"
    headerVariant="initials"
    [folders]="folders$ | async"
    (folderClick)="onFolderClick()"
  >
  </ui-folder-sidebar>

  <ui-page-action-bar title="My Workspace" (newFolder)="onNewFolder()" (uploadFile)="onUploadFile()">
    <div left-actions class="flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-gray-400 ml-4">
      <button class="hover:text-black transition-colors">My Workspace</button>
    </div>
  </ui-page-action-bar>

  <ui-file-table [files]="files$ | async"></ui-file-table>
</ui-dashboard-layout>
