<app-workspace-shell
  title="My Workspace"
  [subtitle]="store.team()?.description || ''"
  initials="ME"
  [themeColor]="store.team()?.color || defaultColor"
  [breadcrumbs]="breadcrumbs"
  [files]="store.files()"
  [folders]="store.folders()"
  (folderClick)="store.onFolderClick()"
  (newFolder)="store.onNewFolder()"
  (uploadFile)="store.onUploadFile()"
  (breadcrumbClick)="onBreadcrumbClick($event)"
>
</app-workspace-shell>
