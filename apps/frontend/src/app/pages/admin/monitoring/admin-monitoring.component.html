<ui-dashboard-layout>
  <ui-admin-sidebar layout-sidebar [activeTab]="activeTab" (tabClick)="onTabClick($event)"></ui-admin-sidebar>
  <div class="flex-1 overflow-hidden bg-lrf-bg relative flex flex-col min-h-0">
    <div class="max-w-7xl w-full mx-auto p-8 flex-1 flex flex-col min-h-0">
      <div class="mb-6 shrink-0">
        <h1 class="text-3xl font-semibold tracking-tight text-lrf-dark">Monitoring</h1>
        <p class="text-sm text-gray-500 mt-2">metrics scraped by Prometheus and visualized in Grafana</p>
        <button
          type="button"
          (click)="openGrafanaInNewTab()"
          class="mt-3 px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors"
        >
          Open Grafana in new tab
        </button>
      </div>
      <div class="flex-1 min-h-[480px] rounded-xl border border-gray-200 bg-white overflow-hidden shadow-sm">
        <iframe
          [title]="'Grafana dashboard'"
          class="w-full h-full min-h-[480px] border-0"
          [src]="grafanaEmbedUrl"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
      <p class="text-xs text-gray-400 mt-3 shrink-0">
        If your browser blocks embedded localhost content, use "Open Grafana in new tab".
      </p>
    </div>
  </div>
</ui-dashboard-layout>
