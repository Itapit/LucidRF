<ui-dashboard-layout>
  <ui-admin-sidebar layout-sidebar [activeTab]="activeTab" (tabClick)="onTabClick($event)"></ui-admin-sidebar>

  <ui-page-action-bar title="User Management" [showNewFolder]="false" [showUpload]="false"></ui-page-action-bar>

  <div class="flex-1 overflow-y-auto p-8 flex justify-center bg-gray-50">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border border-gray-200 h-fit mt-8">
      <div class="mb-6 text-center">
        <h2 class="text-2xl font-bold text-gray-800">Create New User</h2>
        <p class="text-sm text-gray-500 mt-1">Add a new user to the system</p>
      </div>

      <form [formGroup]="adminCreateForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <ui-form-field label="Username" forId="username">
          <input id="username" type="text" formControlName="username" placeholder="john.doe" uiInput />
        </ui-form-field>

        <ui-form-field label="Email" forId="email">
          <input id="email" type="email" formControlName="email" placeholder="your@email.com" uiInput />
        </ui-form-field>

        <ui-form-field label="Role" forId="role">
          <select id="role" formControlName="role" uiSelect>
            <option *ngFor="let option of roles" [value]="option.value || option">
              {{ option.label || option }}
            </option>
          </select>
        </ui-form-field>

        @if (error(); as e) {
        <ui-alert type="error" [message]="e"></ui-alert>
        }

        <ui-button
          type="submit"
          [disabled]="adminCreateForm.invalid"
          [loading]="isLoading()"
          loadingText="Creating user..."
          [fullWidth]="true"
        >
          Create User
        </ui-button>
      </form>
    </div>
  </div>
</ui-dashboard-layout>
