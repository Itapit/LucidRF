<div class="flex justify-center items-center min-h-screen bg-gray-50">
  <form
    [formGroup]="adminCreateForm"
    (ngSubmit)="onSubmit()"
    class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md border border-gray-100 flex flex-col gap-5"
  >
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">Create New User</h2>

    <ui-form-field label="Username" forId="username">
      <input id="username" type="text" formControlName="username" placeholder="john.doe" uiInput />
    </ui-form-field>

    <ui-form-field label="Email" forId="email">
      <input id="email" type="email" formControlName="email" placeholder="your@email.com" uiInput />
    </ui-form-field>

    <ui-form-field label="Role" forId="role">
      <select id="role" formControlName="role" uiSelect>
        <option *ngFor="let option of roles" [value]="option.value || option">{{ option.label || option }}</option>
      </select>
    </ui-form-field>

    <ui-alert *ngIf="error$ | async as error" type="error" [message]="error"></ui-alert>

    <ui-button type="submit" [disabled]="adminCreateForm.invalid || ((isLoading$ | async) ?? false)" [fullWidth]="true">
      <svg
        *ngIf="(isLoading$ | async) ?? false"
        class="animate-spin -ml-1 mr-3 h-5 w-5"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      Create User
    </ui-button>
  </form>
</div>
