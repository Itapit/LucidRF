<div class="flex justify-center items-center min-h-screen bg-gray-50">
  <form
    [formGroup]="setupForm"
    (ngSubmit)="onSubmit()"
    class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md border border-gray-100"
  >
    <h2 class="text-2xl font-bold mb-2 text-gray-800 text-center">Set Your Password</h2>
    <p class="text-center mb-6 text-gray-600 text-sm">Welcome! Please set a new password to activate your account.</p>

    <div class="mb-6">
      <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">New Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter new password"
          class="pl-10 appearance-none border border-gray-300 rounded-md w-full py-2.5 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
        />
      </div>
      <div
        *ngIf="setupForm.get('password')?.invalid && setupForm.get('password')?.touched"
        class="text-red-500 text-xs mt-1"
      >
        <p *ngIf="setupForm.get('password')?.errors?.['required']">Password is required.</p>
        <p *ngIf="setupForm.get('password')?.errors?.['minlength']">Password must be at least 8 characters.</p>
      </div>
    </div>

    <div *ngIf="error$ | async as err" class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-md">
      <div class="flex items-center">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-700">{{ err }}</p>
        </div>
      </div>
    </div>

    <button
      type="submit"
      [disabled]="setupForm.invalid || ((isLoading$ | async) ?? false)"
      class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
    >
      <svg
        *ngIf="(isLoading$ | async) ?? false"
        class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      Activate Account
    </button>
  </form>
</div>
